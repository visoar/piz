name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            name: x86_64-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
            deb: true
          - target: aarch64-unknown-linux-gnu
            name: aarch64-linux-gnu
            os: ubuntu-22.04-arm
            archive: tar.gz
          - target: x86_64-apple-darwin
            name: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            name: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            name: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            msi: true

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      # ── Build ──
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      # ── Package: tar.gz (Unix) ──
      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../piz-${{ matrix.name }}.tar.gz piz
          cd ../../..

      # ── Package: zip (Windows) ──
      - name: Package (Windows zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/piz.exe -DestinationPath piz-${{ matrix.name }}.zip

      # ── Package: MSI (Windows) ──
      - name: Install cargo-wix
        if: matrix.msi
        run: cargo install cargo-wix --version 0.3.9
      - name: Init WiX
        if: matrix.msi
        shell: pwsh
        run: |
          if (-not (Test-Path "wix/main.wxs")) {
            cargo wix init --force
          }
      - name: Build MSI
        if: matrix.msi
        run: cargo wix --no-build --nocapture --target ${{ matrix.target }}
      - name: Rename MSI
        if: matrix.msi
        shell: pwsh
        run: |
          $msi = Get-ChildItem target/wix/*.msi | Select-Object -First 1
          Copy-Item $msi.FullName "piz-${{ matrix.name }}.msi"

      # ── Package: deb (Linux x86_64) ──
      - name: Install cargo-deb
        if: matrix.deb
        run: cargo install cargo-deb
      - name: Build deb
        if: matrix.deb
        run: |
          cargo deb --target ${{ matrix.target }} --no-build
          cp target/${{ matrix.target }}/debian/*.deb piz-${{ matrix.name }}.deb

      # ── Upload ──
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: piz-${{ matrix.name }}
          path: |
            piz-${{ matrix.name }}.tar.gz
            piz-${{ matrix.name }}.zip
            piz-${{ matrix.name }}.msi
            piz-${{ matrix.name }}.deb
          if-no-files-found: ignore

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List artifacts for upload
        run: ls -lh piz-* 2>/dev/null || echo "No artifacts found"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            piz-*.tar.gz
            piz-*.zip
            piz-*.msi
            piz-*.deb
